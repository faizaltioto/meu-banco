<!DOCTYPE html>
<html>
<head>
    <title>Meu Banco</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f0f1a;
            color: white;
            font-family: Arial;
        }

        .topo {
            background-color: #16213e;
            padding: 20px;
            text-align: center;
            color: #00d4ff;
            font-size: 24px;
        }

        .menu {
            display: flex;
            justify-content: center;
            background-color: #1a1a2e;
            padding: 10px;
            gap: 10px;
        }

        .menu button {
            background-color: #00d4ff;
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .conteudo {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
        }

        .caixa {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00d4ff;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
        }

        .mensagem {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }

        .sucesso { background-color: #1a4a1a; color: #00ff00; }
        .erro { background-color: #4a1a1a; color: #ff0000; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        th { color: #00d4ff; }

        #pagina-login { display: block; }
        #pagina-principal { display: none; }
    </style>
</head>
<body>

<!-- PÁGINA DE LOGIN -->
<div id="pagina-login">
    <div class="conteudo">
        <div class="caixa">
            <h2 style="text-align:center; color:#00d4ff; margin-bottom:20px">
                🏦 Meu Banco
            </h2>
            <input id="utilizador" type="text" placeholder="Utilizador">
            <input id="senha" type="password" placeholder="Senha">
            <button onclick="fazer_login()">Entrar</button>
            <div id="msg-login"></div>
        </div>
    </div>
</div>

<!-- PÁGINA PRINCIPAL -->
<div id="pagina-principal">
    <div class="topo">🏦 Meu Banco</div>
    <div class="menu">
        <button onclick="mostrar('clientes')">Clientes</button>
        <button onclick="mostrar('criar')">Novo Cliente</button>
        <button onclick="mostrar('depositar')">Depositar</button>
        <button onclick="mostrar('levantar')">Levantar</button>
        <button onclick="mostrar('transferir')">Transferir</button>
        <button onclick="mostrar('transaccoes')">Histórico</button>
    </div>

    <div class="conteudo">

        <!-- CLIENTES -->
        <div id="sec-clientes" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Lista de Clientes</h3>
            <button onclick="carregar_clientes()">Actualizar</button>
            <div id="lista-clientes"></div>
        </div>

        <!-- CRIAR CLIENTE -->
        <div id="sec-criar" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Novo Cliente</h3>
            <input id="novo-nome" type="text" placeholder="Nome">
            <input id="novo-saldo" type="number" placeholder="Saldo inicial">
            <button onclick="criar_cliente()">Criar</button>
            <div id="msg-criar"></div>
        </div>

        <!-- DEPOSITAR -->
        <div id="sec-depositar" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Depositar</h3>
            <input id="dep-id" type="number" placeholder="ID do cliente">
            <input id="dep-valor" type="number" placeholder="Valor">
            <button onclick="depositar()">Depositar</button>
            <div id="msg-depositar"></div>
        </div>

        <!-- LEVANTAR -->
        <div id="sec-levantar" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Levantar</h3>
            <input id="lev-id" type="number" placeholder="ID do cliente">
            <input id="lev-valor" type="number" placeholder="Valor">
            <button onclick="levantar()">Levantar</button>
            <div id="msg-levantar"></div>
        </div>

        <!-- TRANSFERIR -->
        <div id="sec-transferir" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Transferir</h3>
            <input id="tra-origem" type="number" placeholder="ID de origem">
            <input id="tra-destino" type="number" placeholder="ID de destino">
            <input id="tra-valor" type="number" placeholder="Valor">
            <button onclick="transferir()">Transferir</button>
            <div id="msg-transferir"></div>
        </div>

        <!-- TRANSACÇÕES -->
        <div id="sec-transaccoes" class="caixa" style="display:none">
            <h3 style="color:#00d4ff; margin-bottom:15px">Histórico</h3>
            <button onclick="carregar_transaccoes()">Actualizar</button>
            <div id="lista-transaccoes"></div>
        </div>

    </div>
</div>

<script>
    const IP = "100.88.179.74"
    let token = ""

    function mostrar(seccao) {
        const seccoes = ["clientes", "criar", "depositar", "levantar", "transferir", "transaccoes"]
        seccoes.forEach(s => {
            document.getElementById(`sec-${s}`).style.display = "none"
        })
        document.getElementById(`sec-${seccao}`).style.display = "block"
        if (seccao === "clientes") carregar_clientes()
        if (seccao === "transaccoes") carregar_transaccoes()
    }

    function mostrar_mensagem(id, texto, tipo) {
        const div = document.getElementById(id)
        div.className = `mensagem ${tipo}`
        div.innerHTML = texto
    }

    async function fazer_login() {
        const utilizador = document.getElementById("utilizador").value
        const senha = document.getElementById("senha").value
        const resposta = await fetch(`http://${IP}:8000/login`, {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: `username=${utilizador}&password=${senha}`
        })
        const dados = await resposta.json()
        if (dados.access_token) {
            token = dados.access_token
            document.getElementById("pagina-login").style.display = "none"
            document.getElementById("pagina-principal").style.display = "block"
            mostrar("clientes")
        } else {
            mostrar_mensagem("msg-login", "Credenciais incorrectas!", "erro")
        }
    }

    async function carregar_clientes() {
        const resposta = await fetch(`http://${IP}:8000/clientes`, {
            headers: {"Authorization": `Bearer ${token}`}
        })
        const dados = await resposta.json()
        let html = "<table><tr><th>ID</th><th>Nome</th><th>Saldo</th></tr>"
        dados.clientes.forEach(c => {
            html += `<tr><td>${c[0]}</td><td>${c[1]}</td><td>MZN ${c[2]}</td></tr>`
        })
        html += "</table>"
        document.getElementById("lista-clientes").innerHTML = html
    }

    async function criar_cliente() {
        const nome = document.getElementById("novo-nome").value
        const saldo = document.getElementById("novo-saldo").value
        const resposta = await fetch(`http://${IP}:8000/clientes/criar`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({nome, saldo: parseFloat(saldo)})
        })
        const dados = await resposta.json()
        mostrar_mensagem("msg-criar", dados.mensagem, "sucesso")
    }

    async function depositar() {
        const id_cliente = document.getElementById("dep-id").value
        const valor = document.getElementById("dep-valor").value
        const resposta = await fetch(`http://${IP}:8000/depositar`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({id_cliente: parseInt(id_cliente), valor: parseFloat(valor)})
        })
        const dados = await resposta.json()
        mostrar_mensagem("msg-depositar", dados.mensagem || dados.detail, dados.mensagem ? "sucesso" : "erro")
    }

    async function levantar() {
        const id_cliente = document.getElementById("lev-id").value
        const valor = document.getElementById("lev-valor").value
        const resposta = await fetch(`http://${IP}:8000/levantar`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({id_cliente: parseInt(id_cliente), valor: parseFloat(valor)})
        })
        const dados = await resposta.json()
        mostrar_mensagem("msg-levantar", dados.mensagem || dados.detail, dados.mensagem ? "sucesso" : "erro")
    }

    async function transferir() {
        const id_origem = document.getElementById("tra-origem").value
        const id_destino = document.getElementById("tra-destino").value
        const valor = document.getElementById("tra-valor").value
        const resposta = await fetch(`http://${IP}:8000/transferir`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({id_origem: parseInt(id_origem), id_destino: parseInt(id_destino), valor: parseFloat(valor)})
        })
        const dados = await resposta.json()
        mostrar_mensagem("msg-transferir", dados.mensagem || dados.detail, dados.mensagem ? "sucesso" : "erro")
    }

    async function carregar_transaccoes() {
        const resposta = await fetch(`http://${IP}:8000/transaccoes`, {
            headers: {"Authorization": `Bearer ${token}`}
        })
        const dados = await resposta.json()
        let html = "<table><tr><th>Tipo</th><th>Valor</th><th>Cliente</th></tr>"
        dados.transaccoes.forEach(t => {
            html += `<tr><td>${t[1]}</td><td>MZN ${t[2]}</td><td>${t[3]}</td></tr>`
        })
        html += "</table>"
        document.getElementById("lista-transaccoes").innerHTML = html
    }
</script>

</body>
</html>
