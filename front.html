<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frontend sem JS</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 14px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
    input { width: 100%; padding: 10px; margin: 6px 0 12px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login (sem JavaScript)</h2>

    <!-- IMPORTANTE:
         action = para onde vai enviar
         method = POST (envia dados)
         name = o nome da variável que o backend recebe
    -->
    <form action="http://127.0.0.1:8000/processar" method="post">
      <label>Nome</label>
      <input name="nome" placeholder="Digite seu nome" required>

      <label>Senha</label>
      <input name="senha" type="password" placeholder="Digite sua senha" required>

      <button type="submit">Enviar</button>
    </form>
  </div>

</body>
</html>
